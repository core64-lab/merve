# Complete mlserver.yaml Example with All Available Parameters
# =============================================================
# This file demonstrates ALL configuration options available in MLServer.
# Most parameters have sensible defaults - you only need to specify what differs.

# Server Configuration
server:
  title: "ML Server"                    # API title in docs
  host: "0.0.0.0"                       # Network interface
  port: 8000                            # Port number (1-65535)
  log_level: "INFO"                     # DEBUG|INFO|WARNING|ERROR
  workers: 1                            # Number of processes (1 for K8s)

  # CORS (optional, disabled by default for security)
  cors:
    allow_origins: []                   # Empty = CORS disabled
    allow_methods: ["GET", "POST"]
    allow_headers: ["Content-Type"]
    allow_credentials: false

  # Logger configuration (optional)
  logger:
    timestamp: false                    # Include timestamps (false for containers - the runtime adds them)
    structured: true                    # Use structured JSON logging
    show_tasks: false                   # Show async task names (Task-1, Task-2) in logs
    format: null                        # Custom log format string (overrides other settings)

# Predictor Configuration (REQUIRED - the only required section)
predictor:
  module: "my_predictor"                # Python module name (placeholder - replace with your own module)
  class_name: "MyPredictor"             # Class to instantiate
  init_kwargs:                          # Constructor arguments
    model_path: "./models/model.pkl"
    threshold: 0.5

# API Configuration (OPTIONAL - defaults shown below are used if omitted)
api:
  version: "v1"                         # API version
  endpoints:
    predict: true
    # Note: the former batch endpoint was removed - /predict handles both single and batch
    predict_proba: true

  # Input/Output
  adapter: "records"                    # records|ndarray|auto
  feature_order: null                   # Enforce feature order

  # Response Format
  response_format: "standard"           # standard|passthrough ('custom' is DEPRECATED, removal in 1.0: use 'standard' or 'passthrough')
  response_validation: true
  extract_values: false                 # DEPRECATED (removal in 1.0): return the desired structure from your predictor instead

  # Concurrency
  thread_safe_predict: false
  max_concurrent_predictions: 1         # 0 disables the limiter

  # Warmup
  warmup_on_start: true                 # Run a warmup prediction at startup (reduces first-request latency)

# Observability
observability:
  metrics: true
  metrics_endpoint: "/metrics"
  structured_logging: true
  log_payloads: false                   # Privacy consideration
  correlation_ids: true

# Classifier Metadata (OPTIONAL - auto-generated from the predictor class name if omitted)
classifier:
  name: "my-classifier"                 # URL-safe name
  version: "1.0.0"                      # Semantic version
  repository: "my-ml-repo"              # Repository name
  description: "Example classifier"

# Model Metadata (OPTIONAL)
model:
  version: "1.0.0"
  trained_at: "2025-01-17T10:30:00Z"
  metrics:
    accuracy: 0.95
    precision: 0.93
    recall: 0.91

# Build Configuration (OPTIONAL)
build:
  base_image: "python:3.9-slim"
  registry: "docker.io/myorg"
  tag_prefix: "ml-models"
  include_files: ["models/", "*.py"]
  exclude_patterns: ["*.pyc", "tests/"]

# Deployment Configuration (OPTIONAL - registry and release settings)
# deployment:
#   strategy: "single"                  # single|multi (separate services per classifier)
#   container_naming: "{repository}-{classifier}:{version}"
#   git_tag_format: "{classifier}-v{version}"  # DEPRECATED: `merve tag` uses canonical <classifier>/vX.Y.Z tags; legacy tags remain readable
#   parallel_builds: true               # Parallel container builds for multi-classifier repos
#   registry:
#     type: "ghcr"                      # ghcr (GitHub Container Registry) | ecr (AWS)
#     url: null                         # Registry URL (GHCR default: ghcr.io)
#     namespace: "your-org"             # Registry namespace (GHCR default: auto-detected from git)
#     push_on_build: false              # Automatically push after build
#     # ecr:                            # Required when type: ecr
#     #   aws_region: "eu-central-1"
#     #   registry_id: "123456789012"   # AWS account ID
#     #   repository_prefix: "ml-classifiers"